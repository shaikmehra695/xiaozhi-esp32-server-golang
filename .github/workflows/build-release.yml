name: Build Go binaries

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify asr_server submodule
        run: |
          if [ ! -f asr_server/server/setup.go ]; then
            echo "::error::asr_server 子模块未拉取，binary 构建需要 voice_server" 
            ls -la asr_server 2>/dev/null || true
            exit 1
          fi

      - name: Build Windows package with Docker
        run: |
          docker build -f docker/Dockerfile.windows -t xiaozhi-build-windows .
          docker create --name xiaozhi_windows xiaozhi-build-windows
          docker cp xiaozhi_windows:/out ./out
          docker rm xiaozhi_windows
          VERSION="${{ github.ref_name }}"
          rm -rf "out/xiaozhi_server-windows-amd64-${VERSION}"
          mv out/windows-amd64 "out/xiaozhi_server-windows-amd64-${VERSION}"

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: xiaozhi_server-windows-amd64-${{ github.ref_name }}
          path: out/xiaozhi_server-windows-amd64-${{ github.ref_name }}

  build-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify asr_server submodule
        run: |
          if [ ! -f asr_server/server/setup.go ]; then
            echo "::error::asr_server 子模块未拉取，binary 构建需要 voice_server" 
            ls -la asr_server 2>/dev/null || true
            exit 1
          fi

      - name: Build Linux package with Docker
        run: |
          docker build -f docker/Dockerfile.linux -t xiaozhi-build-linux .
          docker create --name xiaozhi_linux xiaozhi-build-linux
          docker cp xiaozhi_linux:/out ./out
          docker rm xiaozhi_linux
          VERSION="${{ github.ref_name }}"
          rm -rf "out/xiaozhi_server-linux-amd64-${VERSION}"
          mv out/linux-amd64 "out/xiaozhi_server-linux-amd64-${VERSION}"

      - name: Upload Linux package
        uses: actions/upload-artifact@v4
        with:
          name: xiaozhi_server-linux-amd64-${{ github.ref_name }}
          path: out/xiaozhi_server-linux-amd64-${{ github.ref_name }}

  release:
    needs:
      - build-windows-amd64
      - build-linux-amd64
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows package
        uses: actions/download-artifact@v4
        with:
          name: xiaozhi_server-windows-amd64-${{ github.ref_name }}
          path: release

      - name: Download Linux package
        uses: actions/download-artifact@v4
        with:
          name: xiaozhi_server-linux-amd64-${{ github.ref_name }}
          path: release

      - name: Pack release zip
        run: |
          VERSION="${{ github.ref_name }}"
          cd release && zip -r "xiaozhi_server-windows-amd64-${VERSION}.zip" "xiaozhi_server-windows-amd64-${VERSION}" && zip -r "xiaozhi_server-linux-amd64-${VERSION}.zip" "xiaozhi_server-linux-amd64-${VERSION}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            release/xiaozhi_server-windows-amd64-${{ github.ref_name }}.zip
            release/xiaozhi_server-linux-amd64-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
